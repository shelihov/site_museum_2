<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главная - Виртуальный музей</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/main-menu.css">
</head>
<body>
  <div id="header"></div>

  <main class="museum-home">
    <section class="computer" aria-label="Интерактивное меню музея">
      <h1 class="home-title">Выберите зал музея</h1>

      <div class="monitor">
        <div class="screen-frame">
          <div class="screen">
            <div class="desktop">
              <a class="desktop-icon" href="/halls/hall1/hall_1.html">
                <img class="desktop-icon-img" src="/main-menu-icons/hall1-abacus.svg" alt="">
                <span>Зал 1<br>Домеханическая эпоха</span>
              </a>

              <a class="desktop-icon" href="/halls/hall2/hall_2.html">
                <img class="desktop-icon-img" src="/main-menu-icons/hall2-gears.svg" alt="">
                <span>Зал 2<br>Вычислители</span>
              </a>

              <a class="desktop-icon" href="/halls/hall3/hall_3.html">
                <img class="desktop-icon-img" src="/main-menu-icons/hall3-chip.svg" alt="">
                <span>Зал 3<br>Поколения ЭВМ</span>
              </a>

              <a class="desktop-icon" href="/halls/hall4/hall_4.html">
                <img class="desktop-icon-img" src="/main-menu-icons/hall4-device.svg" alt="">
                <span>Зал 4<br>Современные системы</span>
              </a>

              <a class="desktop-icon" href="/halls/hall5/hall_5.html">
                <img class="desktop-icon-img" src="/main-menu-icons/hall5-display.svg" alt="">
                <span>Зал 5<br>Дисплеи</span>
              </a>
            </div>

            <div class="taskbar">
              <span class="start-button">
                <span class="start-mark" aria-hidden="true"></span>
                Пуск
              </span>
              <div class="task-status">museum.exe</div>
              <div class="clock">1998</div>
            </div>
          </div>
        </div>
        <div class="monitor-neck"></div>
        <div class="monitor-base"></div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="/script.js"></script>
</body>
</html>
